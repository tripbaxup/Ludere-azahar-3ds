name: Flatten Nested Folder

on:
  workflow_dispatch:

jobs:
  flatten:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Move contents up one level
        run: |
          shopt -s dotglob
          mv Ludere-azahar-3ds/* .
          rmdir Ludere-azahar-3ds

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Flatten nested folder" || echo "Nothing to commit"
          git push
