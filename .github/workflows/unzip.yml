name: Unzip Contents

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip contents
        run: |
          unzip -o Ludere-azahar-3ds-fixed.zip -d .
          rm Ludere-azahar-3ds-fixed.zip

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Unzip project contents" || echo "Nothing to commit"
          git push
